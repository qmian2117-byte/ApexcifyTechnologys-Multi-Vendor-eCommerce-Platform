<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Hub - MarketHub Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-50 flex flex-col min-h-screen text-gray-900">

    <header class="bg-white/80 backdrop-blur-2xl border-b border-gray-100 sticky top-0 z-[100]">
        <nav class="container mx-auto px-8 py-5 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-4 text-2xl font-black">
                <div class="w-12 h-12 bg-primary rounded-2xl flex items-center justify-center text-white shadow-2xl shadow-primary/40 group overflow-hidden relative">
                    <i class="fas fa-boxes-stacked relative z-10 transition-transform group-hover:scale-110"></i>
                    <div class="absolute inset-0 bg-gradient-to-tr from-indigo-600 to-blue-400 opacity-50"></div>
                </div>
                <span class="text-dark tracking-tighter">Vendor Dashboard</span>
            </a>
            <div class="flex items-center gap-8">
                <div class="hidden md:flex items-center gap-3 px-4 py-2 bg-indigo-50 rounded-full border border-indigo-100">
                    <div class="w-2 h-2 bg-primary rounded-full animate-pulse"></div>
                    <span class="text-[9px] font-black text-primary uppercase tracking-widest leading-none">Server Online</span>
                </div>
                <button onclick="MarketHubAPI.auth.logout()" class="text-[10px] font-black text-gray-400 hover:text-red-500 transition-all uppercase tracking-widest flex items-center gap-3">
                    Logout <i class="fas fa-power-off text-xs opacity-30"></i>
                </button>
            </div>
        </nav>
    </header>

    <main class="flex-1 container mx-auto px-8 py-12">
        <div class="flex flex-col lg:flex-row gap-12">
            
            <aside class="w-full lg:w-80 space-y-8">
                <div class="card-glass bg-white p-10 rounded-[3rem] border border-gray-100 shadow-2xl shadow-indigo-500/5 text-center group">
                    <div id="v-avatar" class="w-24 h-24 bg-dark text-white rounded-[2rem] flex items-center justify-center text-4xl font-black mx-auto mb-6 shadow-xl shadow-dark/20 group-hover:scale-105 transition-transform duration-500">V</div>
                    <h2 id="v-name" class="text-2xl font-extrabold text-dark tracking-tight mb-2">Vendor Manager</h2>
                    <p class="text-gray-400 font-bold text-[10px] uppercase tracking-[0.3em] px-4 py-1.5 bg-gray-50 rounded-full inline-block">Verified Merchant</p>
                </div>
                <nav class="flex flex-col gap-3">
                    <button class="dash-btn active group">
                        <div class="w-10 h-10 rounded-xl bg-primary text-white flex items-center justify-center shadow-lg shadow-primary/30"><i class="fas fa-cubes text-sm"></i></div>
                        Inventory
                    </button>
                    <button class="dash-btn opacity-30 cursor-not-allowed group">
                        <div class="w-10 h-10 rounded-xl bg-gray-50 text-gray-400 flex items-center justify-center"><i class="fas fa-chart-pie text-sm"></i></div>
                        Analytics
                    </button>
                </nav>
            </aside>

            <div class="flex-1 min-w-0 space-y-10">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-8 reveal-up">
                    <div>
                        <h3 class="text-[10px] font-black text-primary uppercase tracking-[0.5em] mb-4">Stock Overview</h3>
                        <h2 class="text-4xl font-black text-dark tracking-tighter leading-none">Your Products</h2>
                    </div>
                    <button onclick="openAddModal()" class="btn-elite btn-primary !px-10 !py-5 !text-[10px] !uppercase !tracking-[0.4em] shadow-2xl shadow-primary/20">
                        <i class="fas fa-plus-circle mr-3"></i> Add Product
                    </button>
                </div>

                <div id="product-list" class="grid sm:grid-cols-2 xl:grid-cols-3 gap-10 reveal-up">
                    <!-- Products dynamically injected -->
                </div>
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div id="add-modal" class="fixed inset-0 bg-dark/95 backdrop-blur-2xl z-[200] hidden items-center justify-center p-8 overflow-y-auto">
        <div class="bg-white rounded-[4rem] p-12 max-w-2xl w-full shadow-2xl relative animate-up my-auto">
            <button onclick="closeAddModal()" class="absolute top-10 right-10 w-12 h-12 bg-gray-50 text-gray-300 hover:bg-red-50 hover:text-red-500 rounded-2xl transition-all flex items-center justify-center border border-gray-100">
                <i class="fas fa-times"></i>
            </button>
            <div class="mb-10">
                <h3 class="text-[10px] font-black text-primary uppercase tracking-[0.5em] mb-4">Induction</h3>
                <h2 class="text-4xl font-black text-dark tracking-tighter">New Product</h2>
            </div>
            
            <form id="add-product-form" class="space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="space-y-3">
                         <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Product Name</label>
                         <input type="text" id="p-name" placeholder="Item Name" class="input-elite font-black" required>
                    </div>
                    <div class="space-y-3">
                         <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Category</label>
                         <input type="text" id="p-category" placeholder="Electronics" class="input-elite font-black" required>
                    </div>
                </div>
                <div class="space-y-3">
                     <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Product Description</label>
                     <textarea id="p-desc" placeholder="Details about this product.." rows="3" class="input-elite font-black py-5 h-auto" required></textarea>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="space-y-3">
                         <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Price (PKR)</label>
                         <input type="number" id="p-price" placeholder="45000" class="input-elite font-black" required>
                    </div>
                    <div class="space-y-3">
                         <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Stock Count</label>
                         <input type="number" id="p-stock" placeholder="25" class="input-elite font-black" required>
                    </div>
                </div>
                <div class="space-y-3">
                     <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Image URL</label>
                     <input type="url" id="p-image" placeholder="Image Link" class="input-elite font-black" required>
                </div>
                
                <button type="submit" id="submit-btn" class="btn-elite btn-primary w-full !h-20 !text-[11px] !font-black !uppercase !tracking-[0.5em] shadow-2xl shadow-primary/30 mt-4 relative overflow-hidden group">
                    <span class="relative z-10">Submit Product</span>
                    <div class="absolute inset-0 bg-white/10 translate-y-full group-hover:translate-y-0 transition-transform duration-500"></div>
                </button>
            </form>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="api.js"></script>
    <script src="script.js"></script>
    <script>
        let currentUser = null;

        document.addEventListener('DOMContentLoaded', () => {
            currentUser = MarketHubAPI.auth.getUser();
            if (!currentUser || currentUser.role !== 'vendor') { window.location.href = 'login.html'; return; }
            document.getElementById('v-name').innerText = currentUser.name;
            document.getElementById('v-avatar').innerText = currentUser.name.charAt(0).toUpperCase();
            loadInventory();
        });

        async function loadInventory() {
            const list = document.getElementById('product-list');
            list.innerHTML = Array(3).fill(0).map(() => `
                <div class="bg-gray-50/50 rounded-[2.5rem] p-6 border border-gray-100">
                    <div class="skeleton aspect-video rounded-[1.5rem] mb-6"></div>
                    <div class="skeleton h-6 w-2/3 mb-4 rounded-lg"></div>
                    <div class="skeleton h-12 w-full rounded-2xl"></div>
                </div>
            `).join('');

            try {
                const response = await MarketHubAPI.products.getAll({ vendorId: currentUser.id });
                if (response.success && response.products) {
                    if (response.products.length === 0) { 
                        list.innerHTML = '<div class="col-span-full py-24 text-center bg-gray-50/50 rounded-[3rem] border border-gray-100"><p class="text-sm font-black text-gray-200 uppercase tracking-[0.5em]">No products found.</p></div>'; 
                        return; 
                    }
                    list.innerHTML = response.products.map(p => `
                        <div class="bg-white rounded-[2.5rem] p-6 border border-gray-50 flex flex-col hover:shadow-2xl hover:border-primary/10 transition-all duration-500 group relative reveal-up-active overflow-hidden">
                            <div class="aspect-video rounded-[1.5rem] overflow-hidden mb-6 border border-gray-100 bg-gray-50/50 relative">
                                 <img src="${p.image}" class="w-full h-full object-cover transition-all duration-700 group-hover:scale-110">
                                 <div class="absolute inset-0 bg-dark/20 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-4">
                                     <button onclick="deleteProduct('${p._id}')" class="w-12 h-12 bg-red-500 text-white rounded-2xl hover:scale-110 transition-transform shadow-xl"><i class="fas fa-trash-alt"></i></button>
                                 </div>
                            </div>
                            <div class="flex-1 space-y-2">
                                <p class="text-[9px] font-black text-primary uppercase tracking-widest">${p.category}</p>
                                <h4 class="text-xl font-black text-dark tracking-tighter truncate group-hover:text-primary transition-colors">${p.name}</h4>
                            </div>
                            <div class="flex items-center justify-between mt-8 pt-6 border-t border-gray-50">
                                <div class="space-y-1">
                                    <p class="text-[8px] text-gray-300 font-black uppercase tracking-widest">Price</p>
                                    <p class="text-sm font-black text-dark">PKR ${p.price.toLocaleString()}</p>
                                </div>
                                <div class="text-right space-y-1">
                                    <p class="text-[8px] text-gray-300 font-black uppercase tracking-widest">In Stock</p>
                                    <div class="flex items-center gap-2 justify-end">
                                        <div class="w-1.5 h-1.5 bg-success rounded-full animate-pulse"></div>
                                        <p class="text-sm font-black text-dark">${p.stock} Units</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (err) { console.error(err); }
        }

        document.getElementById('add-product-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const data = {
                name: document.getElementById('p-name').value,
                description: document.getElementById('p-desc').value,
                category: document.getElementById('p-category').value,
                price: parseFloat(document.getElementById('p-price').value),
                stock: parseInt(document.getElementById('p-stock').value),
                image: document.getElementById('p-image').value,
                vendorId: currentUser.id,
                vendor: currentUser.name
            };
            try {
                btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner animate-spin"></i> Submitting...';
                const response = await MarketHubAPI.products.create(data);
                if (response.success) { 
                    showToast('Product added successfully!', 'success'); 
                    closeAddModal(); 
                    loadInventory(); 
                } else { showToast('Error adding product.', 'error'); }
            } catch (err) { console.error(err); }
            finally { btn.disabled = false; btn.innerText = 'Submit Product'; }
        });

        async function deleteProduct(id) {
            if (!confirm('Are you sure you want to delete this product?')) return;
            try {
                const response = await MarketHubAPI.fetchWithAuth(`/api/products/${id}`, { method: 'DELETE' });
                if (response.success) { showToast('Product deleted.', 'success'); loadInventory(); }
            } catch (err) { showToast('Delete failed.', 'error'); }
        }

        function openAddModal() { document.getElementById('add-modal').classList.remove('hidden'); document.getElementById('add-modal').classList.add('flex'); }
        function closeAddModal() { document.getElementById('add-modal').classList.add('hidden'); document.getElementById('add-modal').classList.remove('flex'); }
    </script>

    <style>
        .dash-btn {
            width: 100%;
            padding: 1rem 1.5rem;
            border-radius: 1.75rem;
            font-weight: 800;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 1.25rem;
            color: #94a3b8;
            transition: all 0.4s var(--transition);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            border: 1px solid transparent;
        }
        .dash-btn.active { 
            background: #fff; 
            color: var(--dark); 
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.05); 
            border-color: #f1f5f9;
            transform: translateX(8px);
        }
        .dash-btn:not(.active):hover { color: var(--primary); transform: translateX(8px); }
    </style>
</body>
</html>
