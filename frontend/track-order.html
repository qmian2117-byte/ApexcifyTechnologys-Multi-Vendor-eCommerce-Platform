<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Your Order - MarketHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        secondary: '#1e40af',
                        dark: '#0f172a'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

    <header class="bg-white/80 backdrop-blur-2xl border-b border-gray-100 sticky top-0 z-[100]">
        <nav class="container mx-auto px-8 py-5 flex items-center justify-between gap-8">
            <a href="index.html" class="flex items-center gap-4 text-2xl font-black">
                <div class="w-12 h-12 bg-primary rounded-2xl flex items-center justify-center text-white shadow-2xl shadow-primary/40 group overflow-hidden relative">
                    <i class="fas fa-location-dot relative z-10 transition-transform group-hover:scale-110"></i>
                    <div class="absolute inset-0 bg-gradient-to-tr from-indigo-600 to-blue-400 opacity-50"></div>
                </div>
                <span class="text-dark tracking-tighter">MarketHub <span class="text-[9px] font-black text-primary uppercase tracking-[0.3em] ml-2">Logistics</span></span>
            </a>
            <div class="flex items-center gap-10">
                <a href="index.html" class="text-[10px] font-black text-gray-400 hover:text-primary uppercase tracking-[0.3em] transition-colors">Return Home</a>
            </div>
        </nav>
    </header>

    <main class="flex-1 container mx-auto px-8 py-20">
        <div class="max-w-5xl mx-auto">
            <div class="text-center mb-20 reveal-up">
                <h3 class="text-[10px] font-black text-primary uppercase tracking-[0.6em] mb-6">Track Your Package</h3>
                <h1 class="text-6xl font-black text-dark mb-8 tracking-tighter leading-none">Order Tracking</h1>
                <p class="text-gray-400 text-xl font-medium max-w-2xl mx-auto">Enter your tracking ID below to check the latest status of your order.</p>
            </div>

            <div class="card-glass bg-white rounded-[4rem] p-12 border border-gray-100 shadow-2xl shadow-indigo-500/5 mb-16 reveal-up">
                <div class="flex flex-col md:flex-row gap-8">
                    <div class="flex-1 relative">
                        <i class="fas fa-satellite absolute left-8 top-1/2 -translate-y-1/2 text-primary/30 text-xl"></i>
                        <input type="text" id="order-ref" placeholder="Order ID (e.g. 64a8b...)" class="input-elite !pl-20 !py-8 !text-lg !font-black !tracking-tighter">
                    </div>
                    <button onclick="trackOrder()" id="track-btn" class="btn-elite btn-primary !px-16 !py-8 !text-[11px] !uppercase !tracking-[0.5em] shadow-2xl shadow-primary/20">
                        <i class="fas fa-bolt-lightning mr-3"></i> Track Order
                    </button>
                </div>
            </div>

            <div id="tracking-result" class="hidden">
                <!-- Result injected here -->
            </div>

            <div id="tracking-welcome" class="text-center py-24 opacity-20 reveal-up">
                <div class="w-32 h-32 bg-gray-50 rounded-[3rem] items-center justify-center flex mx-auto mb-10 border border-gray-100 shadow-inner">
                    <i class="fas fa-box-open text-5xl text-gray-400"></i>
                </div>
                <p class="text-xs font-black text-gray-400 tracking-[0.8em] uppercase">Ready to Track</p>
            </div>
        </div>
    </main>

    <script src="config.js"></script>
    <script src="api.js"></script>
    <script src="script.js"></script>
    <script>
        async function trackOrder() {
            const orderRef = document.getElementById('order-ref').value.trim();
            const resultEl = document.getElementById('tracking-result');
            const welcomeEl = document.getElementById('tracking-welcome');
            const btn = document.getElementById('track-btn');

            if (!orderRef) { showToast('Order ID required.', 'error'); return; }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner animate-spin"></i> CHECKING...';

            try {
                const user = MarketHubAPI.auth.getUser();
                const email = user ? user.email : '';
                const response = await MarketHubAPI.orders.track(orderRef, email);
                
                if (response.success && response.order) {
                    renderTracking(response.order);
                    welcomeEl.classList.add('hidden');
                    resultEl.classList.remove('hidden');
                    resultEl.classList.add('reveal-up');
                    showToast('Order details found.', 'success');
                } else {
                    showToast(response.message || 'Order not found.', 'error');
                }
            } catch (err) {
                showToast('Connection Error.', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-bolt-lightning mr-3"></i> Track Order';
            }
        }

        function renderTracking(order) {
            const resultEl = document.getElementById('tracking-result');
            const steps = ['pending', 'confirmed', 'processing', 'shipped', 'delivered'];
            const currentIdx = steps.indexOf(order.status);

            resultEl.innerHTML = `
                <div class="card-glass bg-white rounded-[4rem] p-12 border border-gray-100 shadow-2xl shadow-indigo-500/5 relative overflow-hidden group">
                    <div class="flex flex-wrap justify-between items-end gap-10 mb-20 relative z-10">
                        <div>
                            <p class="text-[10px] font-black text-primary uppercase tracking-[0.5em] mb-4">Pipeline Status</p>
                            <h2 class="text-5xl font-black text-dark uppercase tracking-tighter">${order.status}</h2>
                        </div>
                        <div class="text-right">
                             <p class="text-[10px] font-black text-gray-300 uppercase tracking-[0.5em] mb-4">Arrival Estimation</p>
                             <h4 class="text-2xl font-black text-dark tracking-tighter">${new Date(order.estimatedDelivery).toLocaleDateString()}</h4>
                        </div>
                    </div>

                    <!-- Progress Visualization -->
                    <div class="relative mb-24 px-12">
                        <div class="absolute left-12 right-12 top-1/2 -translate-y-1/2 h-2.5 bg-gray-50 border border-gray-100 rounded-full shadow-inner"></div>
                        <div class="absolute left-12 top-1/2 -translate-y-1/2 h-2.5 bg-primary rounded-full transition-all duration-1000 shadow-lg shadow-primary/30" style="width: ${Math.max(0, (currentIdx) / (steps.length - 1)) * 100}%"></div>
                        
                        <div class="relative flex justify-between">
                            ${steps.map((s, i) => `
                                <div class="flex flex-col items-center group/step">
                                    <div class="w-14 h-14 rounded-2xl flex items-center justify-center border-4 ${i <= currentIdx ? 'bg-primary border-primary text-white shadow-xl shadow-primary/30' : 'bg-white border-gray-50 text-gray-200'} z-10 transition-all duration-500 delay-[${i*100}ms] group-hover/step:translate-y-[-4px]">
                                        <i class="fas ${getStatusIcon(s)} text-lg"></i>
                                    </div>
                                    <span class="absolute mt-20 text-[10px] font-black uppercase tracking-[0.2em] ${i <= currentIdx ? 'text-dark' : 'text-gray-300'}">${s}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="grid md:grid-cols-2 gap-16 mt-24 pt-12 border-t border-gray-100 relative z-10">
                        <div class="space-y-6">
                            <h3 class="text-[10px] font-black text-gray-300 uppercase tracking-[0.4em]">Shipping Address</h3>
                            <div class="p-8 bg-gray-50 rounded-[2.5rem] border border-gray-100">
                                <p class="text-dark font-black text-xl mb-2 tracking-tighter">${order.shippingAddress.fullName}</p>
                                <p class="text-gray-400 font-bold text-sm tracking-tight">${order.shippingAddress.address}</p>
                                <p class="text-gray-400 font-bold text-sm tracking-tight">${order.shippingAddress.city}, ${order.shippingAddress.postalCode}</p>
                            </div>
                        </div>
                        <div class="space-y-6">
                            <h3 class="text-[10px] font-black text-gray-300 uppercase tracking-[0.4em]">Order Summary</h3>
                            <div class="p-8 bg-primary rounded-[2.5rem] border border-primary text-white shadow-2xl shadow-primary/20 relative overflow-hidden">
                                <div class="absolute top-0 right-0 p-8 opacity-10"><i class="fas fa-fingerprint text-6xl"></i></div>
                                <div class="relative z-10">
                                    <span class="text-[10px] font-black text-white/50 uppercase tracking-widest block mb-4">Total Price</span>
                                    <span class="text-4xl font-black tracking-tighter italic block">PKR ${order.totalAmount.toLocaleString()}</span>
                                    <div class="mt-8 flex items-center gap-3">
                                        <div class="w-8 h-8 bg-white/20 rounded-xl flex items-center justify-center"><i class="fas fa-shield text-[10px]"></i></div>
                                        <span class="text-[10px] font-black uppercase tracking-widest">Safe & Secure Payment</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function getStatusIcon(s) {
            if (s === 'pending') return 'fa-clock';
            if (s === 'confirmed') return 'fa-shield-check';
            if (s === 'processing') return 'fa-microchip';
            if (s === 'shipped') return 'fa-shuttle-space';
            if (s === 'delivered') return 'fa-house-signal';
            return 'fa-circle';
        }

        const params = new URLSearchParams(window.location.search);
        const orderId = params.get('id');
        if (orderId) {
            document.getElementById('order-ref').value = orderId;
            setTimeout(trackOrder, 1000);
        }
    </script>

    <style>
        .animate-up { animation: fadeInUp 0.5s ease forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</body>
</html>
