<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - MarketHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        secondary: '#1e40af',
                        dark: '#0f172a',
                        light: '#f8fafc'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>
</head>
<body class="font-sans bg-gradient-to-br from-blue-50 via-white to-purple-50 text-gray-900 min-h-screen flex items-center justify-center py-12 px-4">

    <div class="w-full max-w-md">
        <!-- Card -->
        <div class="bg-white rounded-3xl shadow-2xl p-8 md:p-12 animate-scale-in">
            <!-- Icon -->
            <div class="w-20 h-20 bg-gradient-to-br from-primary to-secondary rounded-2xl flex items-center justify-center mx-auto mb-8">
                <i class="fas fa-lock text-white text-3xl"></i>
            </div>

            <!-- Header -->
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold mb-2">Forgot Password?</h2>
                <p class="text-gray-600">No worries! Enter your email and we'll send you reset instructions.</p>
            </div>

            <!-- Form -->
            <form class="space-y-6 needs-validation" novalidate>
                <!-- Email -->
                <div>
                    <label class="block text-sm font-semibold mb-2">Email Address</label>
                    <div class="relative">
                        <input type="email" placeholder="you@example.com"
                               class="w-full px-6 py-4 pl-12 border-2 border-gray-200 rounded-xl focus:border-primary focus:outline-none transition-all"
                               required>
                        <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="w-full px-6 py-4 bg-primary text-white rounded-xl font-semibold text-lg hover:bg-secondary transition-all transform hover:scale-105 shadow-lg hover:shadow-xl">
                    Send Reset Link
                    <i class="fas fa-paper-plane ml-2"></i>
                </button>

                <!-- Back to Login -->
                <div class="text-center">
                    <a href="login.html" class="inline-flex items-center gap-2 text-primary hover:underline font-semibold">
                        <i class="fas fa-arrow-left"></i>
                        Back to Sign In
                    </a>
                </div>
            </form>

            <!-- Info Box -->
            <div class="mt-8 p-4 bg-blue-50 rounded-xl">
                <div class="flex gap-3">
                    <i class="fas fa-info-circle text-primary text-xl flex-shrink-0"></i>
                    <div class="text-sm text-gray-600">
                        <p class="font-semibold mb-1">Didn't receive the email?</p>
                        <p>Check your spam folder or <a href="#" class="text-primary hover:underline">contact support</a> for help.</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom Links -->
        <div class="text-center mt-8">
            <a href="index.html" class="inline-flex items-center gap-2 text-gray-600 hover:text-primary transition-colors">
                <i class="fas fa-home"></i>
                <span>Return to Homepage</span>
            </a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
